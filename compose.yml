services:
  hivepinger:
    image: brianoflondon/podping-hivepinger:1.4.1  # Docker Hub; verified existing tag as of 2026-04-17. Never :latest.
    environment:
      HIVE_ACCOUNT_NAME: ${HIVE_ACCOUNT_NAME}
      HIVE_POSTING_KEY: ${HIVE_POSTING_KEY}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      PODPING_SHARED_SECRET: ${PODPING_SHARED_SECRET}
    depends_on:
      - hivepinger
    restart: unless-stopped
